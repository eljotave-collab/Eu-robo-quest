<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu, Robô Quest - Lvl 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #00ffcc; font-family: 'Orbitron', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; overflow: hidden;
        }
        h1 { 
            font-size: 2.8rem; font-weight: 900;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc; 
            margin-bottom: 20px; animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { 
            from { text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; } 
            to { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc, 0 0 60px #00ffcc; } 
        }
        .game-container { 
            background: rgba(0, 0, 0, 0.8); border: 3px solid #00ffcc; border-radius: 20px; 
            padding: 30px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4), inset 0 0 20px rgba(0, 255, 204, 0.1); 
            max-width: 500px; width: 100%; backdrop-filter: blur(10px);
        }
        .stats { font-size: 1.3rem; margin: 15px 0; color: #fff; font-weight: 700; }
        .viki-timer { 
            color: #ff3366; font-size: 1.4rem; font-weight: 900; margin: 15px 0; 
            animation: pulse 1s infinite; text-shadow: 0 0 10px #ff3366;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        button { 
            background: linear-gradient(45deg, #00ffcc, #00e6b8); color: #0a0a0a; border: none; 
            padding: 15px 35px; font-size: 1.2rem; font-family: 'Orbitron'; font-weight: 900; 
            border-radius: 10px; cursor: pointer; margin: 10px; 
            box-shadow: 0 0 20px #00ffcc, 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 30px #00ffcc, 0 8px 20px rgba(0,0,0,0.4); }
        button:active { transform: translateY(0px); }
        .target { 
            width: 65px; height: 65px; background: radial-gradient(circle, #ff3366, #cc0033); 
            border-radius: 50%; position: absolute; cursor: pointer; 
            box-shadow: 0 0 20px #ff3366, 0 0 40px #ff3366; display: none;
            border: 3px solid #fff; animation: targetPulse 0.8s infinite;
        }
        @keyframes targetPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #gameArea { 
            position: relative; width: 100%; height: 320px; 
            border: 2px dashed #00ffcc; margin: 20px 0; overflow: hidden; 
            border-radius: 15px; background: rgba(0, 255, 204, 0.05);
        }
    </style>
</head>
<body>
    <h1>Lvl 1: Primeira Lei</h1>
    <div class="game-container">
        <div class="stats" id="score">Humanos salvos: 0/15</div>
        <div class="viki-timer" id="timer">VIKI assume em: 20s</div>
        <div id="gameArea"><div class="target" id="target"></div></div>
        <button id="startBtn" onclick="startGame()">INICIAR MISSÃO</button>
        <button id="nextBtn" onclick="location.href='jogo2.html'" style="display:none;">LVL 2 →</button>
    </div>
<script>
let score = 0;
let time = 20;
let gameActive = false;
let timerInterval;
let target = document.getElementById('target');
let gameArea = document.getElementById('gameArea');

function startGame() {
    score = 0;
    time = 20;
    gameActive = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('timer').style.color = '#ff3366';
    document.getElementById('timer').innerText = `VIKI assume em: ${time}s`;
    updateScore();
    spawnTarget();
    timerInterval = setInterval(() => {
        time--;
        document.getElementById('timer').innerText = `VIKI assume em: ${time}s`;
        if (time <= 0) {
            endGame();
        }
    }, 1000);
}

function spawnTarget() {
    if (!gameActive) return;
    let maxX = gameArea.clientWidth - 65;
    let maxY = gameArea.clientHeight - 65;
    target.style.left = Math.random() * maxX + 'px';
    target.style.top = Math.random() * maxY + 'px';
    target.style.display = 'block';
}

target.onclick = function() {
    if (!gameActive) return;
    score++;
    updateScore();
    target.style.display = 'none';
    if (score >= 15) {
        endGame();
    } else {
        setTimeout(spawnTarget, 250);
    }
}

function updateScore() {
    document.getElementById('score').innerText = `Humanos salvos: ${score}/15`;
}

function endGame() {
    gameActive = false;
    clearInterval(timerInterval);
    target.style.display = 'none';
    if (score >= 15) {
        document.getElementById('timer').innerText = 'MISSÃO CUMPRIDA!';
        document.getElementById('timer').style.color = '#00ffcc';
        document.getElementById('nextBtn').style.display = 'inline-block';
    } else {
        document.getElementById('timer').innerText = 'VIKI ASSUMIU O CONTROLE!';
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('startBtn').innerText = 'TENTAR NOVAMENTE';
    }
}
</script>
</body>
</html>
