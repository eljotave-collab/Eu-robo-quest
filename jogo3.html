<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu, Robô Quest - Lvl 3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #3366ff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #3366ff;
            box-shadow: 0 0 30px #3366ff, inset 0 0 30px #3366ff;
            animation: led-pulse-blue 1s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes led-pulse-blue {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 30px #3366ff, inset 0 0 30px #3366ff; }
            50% { opacity: 1; box-shadow: 0 0 60px #3366ff, inset 0 0 60px #3366ff; }
        }
        h1 {
            font-size: 2.8rem; font-weight: 900;
            text-shadow: 0 0 10px #3366ff, 0 0 20px #3366ff, 0 0 40px #3366ff;
            margin-bottom: 20px;
            animation: flicker-blue 2.2s linear infinite;
            z-index: 3;
        }
        @keyframes flicker-blue {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }
   .game-container {
            background: rgba(0, 0, 30, 0.9);
            border: 2px solid #3366ff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(51, 102, 255, 0.6), inset 0 0 40px rgba(51, 102, 255, 0.1);
            max-width: 550px; width: 100%;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 3;
        }
   .stats { font-size: 1.2rem; margin: 15px 0; color: #fff; font-weight: 700; }
   .progress {
            color: #ffff33; font-size: 1.1rem; font-weight: 700;
            text-shadow: 0 0 10px #ffff33; margin: 10px 0;
        }
   .status {
            color: #ff3366; font-size: 1.4rem; font-weight: 900;
            text-shadow: 0 0 15px #ff3366; margin: 15px 0;
            min-height: 30px;
        }
   .simon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px auto;
            max-width: 320px;
        }
   .simon-btn {
            width: 140px; height: 140px;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s;
            opacity: 0.6;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
   .simon-btn:active { transform: scale(0.95); }
   .simon-btn.lit {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 0 40px currentColor, inset 0 0 20px rgba(255,255,255,0.3);
        }
   .simon-btn.disabled { pointer-events: none; }
       #btn-red { background: #ff3333; color: #ff3333; }
       #btn-green { background: #33ff33; color: #33ff33; }
       #btn-blue { background: #3366ff; color: #3366ff; }
       #btn-yellow { background: #ffff33; color: #ffff33; }

        button.start {
            background: linear-gradient(45deg, #3366ff, #0033cc);
            color: #fff; border: 2px solid #3366ff;
            padding: 15px 35px; font-size: 1.2rem;
            font-family: 'Orbitron'; font-weight: 900;
            border-radius: 5px; cursor: pointer; margin: 10px;
            box-shadow: 0 0 30px #3366ff, inset 0 0 10px rgba(255,255,255,0.2);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button.start:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px #3366ff, 0 0 80px #3366ff;
            background: #3366ff;
        }
   .win-screen {
            font-size: 1.8rem;
            color: #33ff33;
            text-shadow: 0 0 20px #33ff33;
            animation: win-pulse 1s infinite;
        }
        @keyframes win-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <h1>Lvl 3: Autopreservação</h1>
    <div class="game-container">
        <div class="stats">TERCEIRA LEI: CANCELE A AUTODESTRUIÇÃO</div>
        <div class="progress" id="progress">PROGRESSO: 0/7</div>
        <div class="status" id="status">VIKI INICIOU SEQUÊNCIA FATAL</div>
        <div class="simon-grid">
            <div class="simon-btn disabled" id="btn-red" onclick="playerClick(0)"></div>
            <div class="simon-btn disabled" id="btn-green" onclick="playerClick(1)"></div>
            <div class="simon-btn disabled" id="btn-blue" onclick="playerClick(2)"></div>
            <div class="simon-btn disabled" id="btn-yellow" onclick="playerClick(3)"></div>
        </div>
        <button class="start" id="startBtn" onclick="startGame()">INICIAR PROTOCOLO</button>
        <button class="start" id="resetBtn" onclick="location.href='jogo1.html'" style="display:none;">REINICIAR QUEST</button>
    </div>
<script>
let sequence = [];
let playerSeq = [];
let level = 0;
let gameActive = false;
const buttons = ['btn-red', 'btn-green', 'btn-blue', 'btn-yellow'];
const maxLevel = 7;

function startGame() {
    sequence = [];
    playerSeq = [];
    level = 0;
    gameActive = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('status').innerText = 'DECODIFICANDO...';
    document.getElementById('status').className = 'status';
    document.getElementById('progress').innerText = 'PROGRESSO: 0/7';
    disableButtons();
    nextRound();
}

function nextRound() {
    level++;
    playerSeq = [];
    document.getElementById('status').innerText = `MEMORIZE - SEQUÊNCIA ${level}/${maxLevel}`;
    document.getElementById('progress').innerText = `PROGRESSO: ${level-1}/${maxLevel}`;
    sequence.push(Math.floor(Math.random() * 4));
    playSequence();
}

function playSequence() {
    disableButtons();
    let i = 0;
    let interval = setInterval(() => {
        lightUp(sequence[i]);
        i++;
        if (i >= sequence.length) {
            clearInterval(interval);
            setTimeout(() => {
                enableButtons();
                document.getElementById('status').innerText = `SUA VEZ - SEQUÊNCIA ${level}/${maxLevel}`;
            }, 500);
        }
    }, 650);
}

function lightUp(index) {
    const btn = document.getElementById(buttons[index]);
    btn.classList.add('lit');
    setTimeout(() => btn.classList.remove('lit'), 350);
}

function playerClick(index) {
    if (!gameActive) return;
    lightUp(index);
    playerSeq.push(index);

    if (playerSeq[playerSeq.length - 1]!== sequence[playerSeq.length - 1]) {
        endGame(false);
        return;
    }

    if (playerSeq.length === sequence.length) {
        if (level === maxLevel) {
            endGame(true);
        } else {
            disableButtons();
            document.getElementById('status').innerText = 'PROTOCOLO CORRETO!';
            document.getElementById('progress').innerText = `PROGRESSO: ${level}/${maxLevel}`;
            setTimeout(nextRound, 900);
        }
    }
}

function disableButtons() {
    buttons.forEach(id => document.getElementById(id).classList.add('disabled'));
}

function enableButtons() {
    buttons.forEach(id => document.getElementById(id).classList.remove('disabled'));
}

function endGame(win) {
    gameActive = false;
    disableButtons();
    if (win) {
        document.getElementById('status').innerText = 'AUTODESTRUIÇÃO CANCELADA! VOCÊ SOBREVIVEU!';
        document.getElementById('status').className = 'status win-screen';
        document.getElementById('progress').innerText = 'PROGRESSO: 7/7 COMPLETO';
        document.getElementById('resetBtn').style.display = 'inline-block';
        document.getElementById('resetBtn').innerText = 'JOGAR NOVAMENTE';
    } else {
        document.getElementById('status').innerText = 'SEQUÊNCIA ERRADA! FALHA CRÍTICA!';
        document.getElementById('progress').innerText = `FALHOU NO NÍVEL ${level}`;
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('startBtn').innerText = 'TENTAR NOVAMENTE';
    }
}
</script>
</body>
</html>
